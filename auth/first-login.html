<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — Rapport Pompiste</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231b263b'/><text x='16' y='23' text-anchor='middle' font-family='Arial' font-weight='900' font-size='16' fill='white'>RP</text></svg>">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="card">
    <div class="auth-brand">
      <div class="auth-brand-icon">RP</div>
      <span class="auth-brand-name">Rapport Pompiste</span>
    </div>

    <h1>Set Your Password</h1>
    <p class="sub">You're using a temporary password. Set a new one to continue.</p>

    <form id="changeForm">
      <div class="input-group">
        <label for="currentPwd">Temporary Password</label>
        <input type="password" id="currentPwd" placeholder="Enter your temporary password" required>
      </div>
      <div class="input-group">
        <label for="newPwd">New Password</label>
        <input type="password" id="newPwd" placeholder="Min. 8 characters" minlength="8" required>
      </div>
      <div class="input-group">
        <label for="confirmPwd">Confirm New Password</label>
        <input type="password" id="confirmPwd" placeholder="Repeat new password" required>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" class="btn" id="submitBtn">Set Password</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.0/dist/iife/sdk.js"></script>
  <script src="../shared/config.js"></script>
  <script src="../shared/auth.js"></script>
  <script>
    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = msg ? "block" : "none";
    }

    // Guard — must be logged in to access this page
    (async function () {
      try {
        await _AW.account.get();
      } catch {
        location.replace(_AW.SIGNIN_URL);
      }
    })();

    document.getElementById("changeForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      showError("");
      const btn        = document.getElementById("submitBtn");
      const currentPwd = document.getElementById("currentPwd").value;
      const newPwd     = document.getElementById("newPwd").value;
      const confirmPwd = document.getElementById("confirmPwd").value;

      if (newPwd.length < 8)       { showError("New password must be at least 8 characters."); return; }
      if (newPwd !== confirmPwd)    { showError("Passwords do not match."); return; }
      if (newPwd === currentPwd)    { showError("New password must be different from your temporary password."); return; }

      btn.disabled = true;

      try {
        // 1. Update the Appwrite account password
        await _AW.account.updatePassword(newPwd, currentPwd);

        // 2. Clear mustChangePassword flag on the users collection doc
        const meRes = await apiFetch("/users/me");
        if (!meRes.ok) throw new Error("Could not load profile.");
        const { user } = await meRes.json();
        const doc = user?.documents?.[0];
        if (!doc) throw new Error("Profile not found. Contact your administrator.");

        await apiFetch(`/users/${doc.$id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mustChangePassword: false })
        });

        // 3. Redirect to correct page based on role
        if (doc.role === "owner" || doc.role === "manager") {
          location.replace(_AW.OWNER_DASHBOARD_URL);
        } else {
          location.replace(_AW.POMPISTE_URL);
        }
      } catch (err) {
        showError(err.message?.includes("Invalid credentials")
          ? "Temporary password is incorrect."
          : "Could not update password. Please try again.");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
